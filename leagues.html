                    opacity: 1;
                }</style></noscript></head><body class="page-template"><header class="top js-header"><a class="logo" href="https://ZarleyLtd.github.io/CrossGunsSnooker/"><img src="https://ZarleyLtd.github.io/CrossGunsSnooker/media/website/crossgunslogo.png" alt="CrossGuns Snooker League" width="281" height="445"></a><nav class="navbar js-navbar"><button class="navbar__toggle js-toggle" aria-label="Menu" aria-haspopup="true" aria-expanded="false"><span class="navbar__toggle-box"><span class="navbar__toggle-inner">Menu</span></span></button><ul class="navbar__menu"><li><a href="https://ZarleyLtd.github.io/CrossGunsSnooker/" target="_self">Home</a></li><li class="active"><a href="https://ZarleyLtd.github.io/CrossGunsSnooker/leagues.html" target="_self">Leagues</a></li><li><a href="https://ZarleyLtd.github.io/CrossGunsSnooker/fixtures.html" target="_self">Fixtures</a></li><li><a href="https://ZarleyLtd.github.io/CrossGunsSnooker/results.html" target="_self">Results</a></li><li><a href="https://ZarleyLtd.github.io/CrossGunsSnooker/top-breaks.html" target="_self">Top Breaks</a></li><li><a href="https://ZarleyLtd.github.io/CrossGunsSnooker/handicaps.html" target="_self">Handicaps</a></li><li><a href="https://ZarleyLtd.github.io/CrossGunsSnooker/rules.html" target="_self">Rules</a></li></ul></nav></header><main class="page"><article class="content"><div class="hero"><header class="hero__content hero__content--centered"><div class="wrapper"><h1>Leagues</h1></div></header><figure class="hero__image"><div class="hero__image-wrapper"><img src="https://ZarleyLtd.github.io/CrossGunsSnooker/media/posts/7/crossgunsbanner.png" srcset="https://ZarleyLtd.github.io/CrossGunsSnooker/media/posts/7/responsive/crossgunsbanner-xs.png 640w, https://ZarleyLtd.github.io/CrossGunsSnooker/media/posts/7/responsive/crossgunsbanner-sm.png 768w, https://ZarleyLtd.github.io/CrossGunsSnooker/media/posts/7/responsive/crossgunsbanner-md.png 1024w, https://ZarleyLtd.github.io/CrossGunsSnooker/media/posts/7/responsive/crossgunsbanner-lg.png 1366w, https://ZarleyLtd.github.io/CrossGunsSnooker/media/posts/7/responsive/crossgunsbanner-xl.png 1600w, https://ZarleyLtd.github.io/CrossGunsSnooker/media/posts/7/responsive/crossgunsbanner-2xl.png 1920w" sizes="88vw" loading="eager" height="320" width="692" alt=""></div></figure></div><div class="entry-wrapper content__entry"><div class="standings-wrap-snip"><div class="standings-wrapper"><h2 class="standings-heading">Group 1</h2><table id="league-a" class="league-standings" aria-label="Group 1 standings"></table></div><div class="standings-wrapper"><h2 class="standings-heading">Group 2</h2><table id="league-b" class="league-standings" aria-label="Group 2 standings"></table></div><div class="standings-wrapper"><h2 class="standings-heading">Group 3</h2><table id="league-c" class="league-standings" aria-label="Group 3 standings"></table></div></div><p><script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script><script>document.addEventListener('DOMContentLoaded', function() {
  var sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTD5fxz45LksV_LJgjEdWpFSHeLNHRmxLc9NKBj8P7xun1822ltfPVM2bbGfUrjtyfZwRNSjGxlnyY6/pub?gid=902750162&single=true&output=csv";

  function StringSafe(v) { return (v === undefined || v === null) ? '' : String(v).trim(); }
  function cellNum(v) {
    return StringSafe(v).replace(/\u2212/g, '-');
  }

  function buildTable(tableId, league) {
    var table = document.getElementById(tableId);
    if (!table) return;
    while (table.firstChild) table.removeChild(table.firstChild);

    var thead = document.createElement('thead');
    var hrow = document.createElement('tr');
    var headers = [
      { t: '#', num: true },
      { t: 'Player Name', num: false },
      { t: 'P', num: true },
      { t: 'W', num: true },
      { t: 'L', num: true },
      { t: '+/-', num: true },
      { t: 'Pts', num: true }
    ];
    headers.forEach(function(h) {
      var th = document.createElement('th');
      th.textContent = h.t;
      if (h.num) th.className = 'col-num';
      hrow.appendChild(th);
    });
    thead.appendChild(hrow);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    if (league.length === 0) {
      var tr0 = document.createElement('tr');
      var td0 = document.createElement('td');
      td0.colSpan = 7;
      td0.textContent = 'No players.';
      tr0.appendChild(td0);
      tbody.appendChild(tr0);
      table.appendChild(tbody);
      return;
    }

    var toInt = function(v) { var n = parseInt(v, 10); return isNaN(n) ? -Infinity : n; };
    var lastPts = null, lastPM = null, lastW = null, lastRank = 0;

    league.forEach(function(p, idx) {
      var pts = toInt(p.Pts);
      var pm = toInt(p['+/-']);
      var w = toInt(p.W);
      var rank;
      if (pts === lastPts && pm === lastPM && w === lastW) {
        rank = lastRank;
      } else {
        rank = idx + 1;
        lastRank = rank;
        lastPts = pts;
        lastPM = pm;
        lastW = w;
      }

      var tr = document.createElement('tr');
      var tdR = document.createElement('td');
      tdR.className = 'col-num';
      tdR.textContent = String(rank);
      var tdN = document.createElement('td');
      tdN.className = 'name';
      tdN.textContent = StringSafe(p['Player Name']);
      var tdP = document.createElement('td');
      tdP.className = 'col-num';
      tdP.textContent = cellNum(p.P);
      var tdW = document.createElement('td');
      tdW.className = 'col-num';
      tdW.textContent = cellNum(p.W);
      var tdL = document.createElement('td');
      tdL.className = 'col-num';
      tdL.textContent = cellNum(p.L);
      var tdPM = document.createElement('td');
      tdPM.className = 'col-num';
      tdPM.textContent = cellNum(p['+/-']);
      var tdPts = document.createElement('td');
      tdPts.className = 'col-num';
      tdPts.textContent = cellNum(p.Pts);

      tr.appendChild(tdR);
      tr.appendChild(tdN);
      tr.appendChild(tdP);
      tr.appendChild(tdW);
      tr.appendChild(tdL);
      tr.appendChild(tdPM);
      tr.appendChild(tdPts);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
  }

  Papa.parse(sheetUrl, {
    download: true,
    skipEmptyLines: true,
    complete: function(results) {
      var dataRows = results.data.slice(3);
      var leagueA = [];
      var leagueB = [];
      var leagueC = [];

      dataRows.forEach(function(row) {
        if (row[0] && row[0].trim()) {
          leagueA.push({ 'Player Name': row[0].trim(), P: row[1]||'', W: row[2]||'', L: row[3]||'', '+/-': row[4]||'', Pts: row[5]||'' });
        }
        if (row[7] && row[7].trim()) {
          leagueB.push({ 'Player Name': row[7].trim(), P: row[8]||'', W: row[9]||'', L: row[10]||'', '+/-': row[11]||'', Pts: row[12]||'' });
        }
        if (row[14] && row[14].trim()) {
          leagueC.push({ 'Player Name': row[14].trim(), P: row[15]||'', W: row[16]||'', L: row[17]||'', '+/-': row[18]||'', Pts: row[19]||'' });
        }
      });

      var toInt = function(v) { var n = parseInt(v, 10); return isNaN(n) ? -Infinity : n; };
      var sortFn = function(a, b) {
        if (toInt(b.Pts) !== toInt(a.Pts)) return toInt(b.Pts) - toInt(a.Pts);
        if (toInt(b['+/-']) !== toInt(a['+/-'])) return toInt(b['+/-']) - toInt(a['+/-']);
        return toInt(b.W) - toInt(a.W);
      };

      leagueA.sort(sortFn);
      leagueB.sort(sortFn);
      leagueC.sort(sortFn);

      buildTable('league-a', leagueA);
      buildTable('league-b', leagueB);
      buildTable('league-c', leagueC);
    }
  });
});</script></p></div></article></main><footer class="footer"><div class="wrapper"><nav class="footer__nav"><ul><li class="active"><a href="https://ZarleyLtd.github.io/CrossGunsSnooker/leagues.html" class="al" target="_self">Leagues</a></li><li><a href="https://ZarleyLtd.github.io/CrossGunsSnooker/fixtures.html" class="al" target="_self">Fixtures</a></li><li><a href="https://ZarleyLtd.github.io/CrossGunsSnooker/results.html" class="al" target="_self">Results</a></li></ul></nav><div class="footer__copyright"><p><span style="color: #169179;">by JP</span></p></div><button id="backToTop" class="footer__bttop" aria-label="Back to top" title="Back to top"><svg width="20" height="20"><use xlink:href="https://ZarleyLtd.github.io/CrossGunsSnooker/assets/svg/svg-map.svg#toparrow"/></svg></button></div></footer><script defer="defer" src="https://ZarleyLtd.github.io/CrossGunsSnooker/assets/js/scripts.min.js?v=700105c316933a8202041b6415abb233"></script><script>window.publiiThemeMenuConfig={mobileMenuMode:'overlay',animationSpeed:300,submenuWidth: 'auto',doubleClickTime:500,mobileMenuExpandableSubmenus:true,relatedContainerForOverlayMenuSelector:'.top'};</script><script>var images = document.querySelectorAll('img[loading]');
