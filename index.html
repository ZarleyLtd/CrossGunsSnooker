ssGunsSnooker/media/posts/6/responsive/crossgunsbanner-2-lg.png 1366w, https://ZarleyLtd.github.io/CrossGunsSnooker/media/posts/6/responsive/crossgunsbanner-2-xl.png 1600w, https://ZarleyLtd.github.io/CrossGunsSnooker/media/posts/6/responsive/crossgunsbanner-2-2xl.png 1920w" sizes="88vw" loading="eager" height="320" width="692" alt=""></div></figure></div><div class="entry-wrapper content__entry"><section class="hero hero--image"><h2 class="align-center"><span style="color: #169179;">Spring League '26</span></h2><p class="align-center">League stage — current leaders</p><div class="home-leader-group"><h3 class="align-center"><span style="color: #169179;">Group 1</span></h3><h3 class="align-center"><span id="g1-leader" style="color: #fff; font-size: 1.2em;">—</span></h3></div><div class="home-leader-group"><h3 class="align-center"><span style="color: #169179;">Group 2</span></h3><h3 class="align-center"><span id="g2-leader" style="color: #fff; font-size: 1.2em;">—</span></h3></div><div class="home-leader-group"><h3 class="align-center"><span style="color: #169179;">Group 3</span></h3><h3 class="align-center"><span id="g3-leader" style="color: #fff; font-size: 1.2em;">—</span></h3></div></section><p><script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script><script>document.addEventListener('DOMContentLoaded', function() {
  var sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTD5fxz45LksV_LJgjEdWpFSHeLNHRmxLc9NKBj8P7xun1822ltfPVM2bbGfUrjtyfZwRNSjGxlnyY6/pub?gid=902750162&single=true&output=csv";

  function rowLooksLikeKnockoutSection(row) {
    var check = [row[0], row[7], row[14]];
    for (var i = 0; i < check.length; i++) {
      var t = (check[i] || '').trim().toLowerCase();
      if (!t) continue;
      if (/\bknockout\b|\bko\b|\bsemi\b|semi\-final|quarter|playoff|\bfinals?\b/.test(t)) return true;
    }
    return false;
  }

  var toInt = function(v) { var n = parseInt(v, 10); return isNaN(n) ? -Infinity : n; };

  var sortFn = function(a, b) {
    if (toInt(b.Pts) !== toInt(a.Pts)) return toInt(b.Pts) - toInt(a.Pts);
    if (toInt(b['+/-']) !== toInt(a['+/-'])) return toInt(b['+/-']) - toInt(a['+/-']);
    return toInt(b.W) - toInt(a.W);
  };

  function getTopPlayers(league) {
    if (league.length === 0) return 'N/A';
    league.sort(sortFn);
    var top = league[0];
    var pts = toInt(top.Pts);
    var pm = toInt(top['+/-']);
    var w = toInt(top.W);
    var names = league.filter(function(p) {
      return toInt(p.Pts) === pts && toInt(p['+/-']) === pm && toInt(p.W) === w;
    }).map(function(p) { return p['Player Name']; });
    if (names.length === 1) return names[0];
    return names.join(' & ') + ' (tied)';
  }

  Papa.parse(sheetUrl, {
    download: true,
    skipEmptyLines: true,
    complete: function(results) {
      var dataRows = results.data.slice(3);
      var leagueA = [];
      var leagueB = [];
      var leagueC = [];

      for (var r = 0; r < dataRows.length; r++) {
        var row = dataRows[r];
        if (rowLooksLikeKnockoutSection(row)) break;

        if (row[0] && row[0].trim()) {
          leagueA.push({
            'Player Name': row[0].trim(),
            P: row[1] || '',
            W: row[2] || '',
            L: row[3] || '',
            '+/-': row[4] || '',
            Pts: row[5] || ''
          });
        }
        if (row[7] && row[7].trim()) {
          leagueB.push({
            'Player Name': row[7].trim(),
            P: row[8] || '',
            W: row[9] || '',
            L: row[10] || '',
            '+/-': row[11] || '',
            Pts: row[12] || ''
          });
        }
        if (row[14] && row[14].trim()) {
          leagueC.push({
            'Player Name': row[14].trim(),
            P: row[15] || '',
            W: row[16] || '',
            L: row[17] || '',
            '+/-': row[18] || '',
            Pts: row[19] || ''
          });
        }
      }

      var el1 = document.getElementById('g1-leader');
      var el2 = document.getElementById('g2-leader');
      var el3 = document.getElementById('g3-leader');
      if (el1) el1.textContent = getTopPlayers(leagueA);
      if (el2) el2.textContent = getTopPlayers(leagueB);
      if (el3) el3.textContent = getTopPlayers(leagueC);
    },
    error: function(err) {
      console.error('Error loading CSV:', err);
    }
  });
});</script></p></div></article></main><footer class="footer"><div class="wrapper"><nav class="footer__nav"><ul><li><a href="https://ZarleyLtd.github.io/CrossGunsSnooker/leagues.html" class="al" target="_self">Leagues</a></li><li><a href="https://ZarleyLtd.github.io/CrossGunsSnooker/fixtures.html" class="al" target="_self">Fixtures</a></li><li><a href="https://ZarleyLtd.github.io/CrossGunsSnooker/results.html" class="al" target="_self">Results</a></li></ul></nav><div class="footer__copyright"><p><span style="color: #169179;">by JP</span></p></div><button id="backToTop" class="footer__bttop" aria-label="Back to top" title="Back to top"><svg width="20" height="20"><use xlink:href="https://ZarleyLtd.github.io/CrossGunsSnooker/assets/svg/svg-map.svg#toparrow"/></svg></button></div></footer><script defer="defer" src="https://ZarleyLtd.github.io/CrossGunsSnooker/assets/js/scripts.min.js?v=700105c316933a8202041b6415abb233"></script><script>window.publiiThemeMenuConfig={mobileMenuMode:'overlay',animationSpeed:300,submenuWidth: 'auto',doubleClickTime:500,mobileMenuExpandableSubmenus:true,relatedContainerForOverlayMenuSelector:'.top'};</script><script>var images = document.querySelectorAll('img[loading]');
